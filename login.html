<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login | Bid-Down</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
        />

        <style>
            :root {
                --primary: #8b5e3c;
                --secondary: #c8a27a;
                --background: #f6f1eb;
                --text: #5a3e2b;
                --text-secondary: #8b6b55;
            }

            body {
                --bs-body-bg: linear-gradient(
                    135deg,
                    var(--primary) 0%,
                    var(--secondary) 100%
                );
            }

            .bg-primary {
                background-color: var(--primary) !important;
            }
            .text-primary {
                color: var(--primary) !important;
            }
            .text-secondary-custom {
                color: var(--text-secondary) !important;
            }

            .form-control:focus {
                border-color: var(--primary);
                box-shadow: 0 0 0 0.2rem rgba(139, 94, 60, 0.25);
            }

            .btn-primary {
                background-color: var(--primary);
                border-color: var(--primary);
                color: white;
            }
            .btn-primary:hover {
                background-color: #724d31;
                border-color: #724d31;
            }
            .btn-outline-primary {
                color: var(--primary);
                border-color: var(--primary);
            }
            .btn-outline-primary:hover {
                background-color: var(--primary);
                color: white;
            }
        </style>
    </head>
    <body class="d-flex align-items-center justify-content-center min-vh-100">
        <div class="w-100" style="max-width: 450px">
            <div
                class="card border-0 shadow-lg"
                style="border-radius: 15px; overflow: hidden"
            >
                <!-- Header -->
                <div class="bg-primary text-white text-center p-4">
                    <h2 class="fw-bold mb-2"><i></i> Bid Down</h2>
                    <p class="mb-0">Masuk ke Akun Anda</p>
                </div>

                <!-- Body -->
                <div class="card-body p-5">
                    <form>
                        <!-- Email Input -->
                        <div class="mb-3">
                            <label
                                for="email"
                                class="form-label fw-bold text-primary"
                                >Email</label
                            >
                            <input
                                type="email"
                                class="form-control form-control-lg"
                                id="email"
                                placeholder="nama@email.com"
                                required
                            />
                        </div>

                        <!-- Password Input -->
                        <div class="mb-2">
                            <label
                                for="password"
                                class="form-label fw-bold text-primary"
                                >Password</label
                            >
                            <input
                                type="password"
                                class="form-control form-control-lg"
                                id="password"
                                placeholder="Masukkan password"
                                required
                            />
                        </div>

                        <!-- Forgot Password -->
                        <div class="text-end mb-4">
                            <a
                                href="#"
                                class="text-primary text-decoration-none small fw-500"
                                >Lupa Password?</a
                            >
                        </div>

                        <!-- Submit Button -->
                        <button
                            type="submit"
                            class="btn btn-primary btn-lg w-100 fw-bold text-white mb-3"
                        >
                            Masuk
                        </button>
                    </form>

                    <!-- Register Link -->
                    <div class="text-center">
                        <p class="text-secondary-custom mb-0">
                            Belum punya akun?
                            <a
                                href="register.html"
                                class="text-primary text-decoration-none fw-bold"
                                >Daftar Sekarang</a
                            >
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
