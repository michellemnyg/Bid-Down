<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Register | Bid-Down</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />

        <style>
            :root {
                --primary: #8b5e3c;
                --secondary: #c8a27a;
                --background: #f6f1eb;
                --text: #5a3e2b;
                --text-secondary: #8b6b55;
            }

            body {
                --bs-body-bg: linear-gradient(
                    135deg,
                    var(--primary) 0%,
                    var(--secondary) 100%
                );
            }

            .bg-primary {
                background-color: var(--primary) !important;
            }
            .text-primary {
                color: var(--primary) !important;
            }
            .text-secondary-custom {
                color: var(--text-secondary) !important;
            }

            .btn-primary {
                background-color: var(--primary);
                border-color: var(--primary);
                color: white;
            }
            .btn-primary:hover {
                background-color: #724d31;
                border-color: #724d31;
            }
            .btn-outline-primary {
                color: var(--primary);
                border-color: var(--primary);
            }
            .btn-outline-primary:hover {
                background-color: var(--primary);
                color: white;
            }

            .form-control:focus {
                border-color: var(--primary);
                box-shadow: 0 0 0 0.2rem rgba(139, 94, 60, 0.25);
            }

            .role-tab.active {
                background-color: var(--primary);
                color: white;
                border-color: var(--primary);
            }

            .form-check-input:checked {
                background-color: var(--primary);
                border-color: var(--primary);
            }
        </style>
    </head>
    <body
        class="d-flex align-items-center justify-content-center min-vh-100 py-4"
    >
        <div class="w-100" style="max-width: 500px">
            <div
                class="card border-0 shadow-lg"
                style="border-radius: 15px; overflow: hidden"
            >
                <!-- Header -->
                <div class="bg-primary text-white text-center p-4">
                    <h2 class="fw-bold mb-2">Register</h2>
                    <p class="mb-0">Daftarkan Akun Baru</p>
                </div>

                <!-- Body -->
                <div class="card-body p-5">
                    <!-- Role Selection -->
                    <div class="row g-2 mb-4">
                        <div class="col-6">
                            <button
                                type="button"
                                class="btn btn-outline-primary role-tab active w-100 py-3 fw-bold"
                                onclick="selectRole('client', this)"
                            >
                                Saya Klien
                            </button>
                        </div>
                        <div class="col-6">
                            <button
                                type="button"
                                class="btn btn-outline-primary role-tab w-100 py-3 fw-bold"
                                onclick="selectRole('freelancer', this)"
                            >
                                Saya Freelancer
                            </button>
                        </div>
                    </div>

                    <form id="register-form">
                        <!-- CLIENT FORM -->
                        <div id="client-form" class="d-block">
                            <div class="mb-3">
                                <label
                                    for="client-name"
                                    class="form-label fw-bold text-primary"
                                    >Nama Lengkap / Nama Perusahaan</label
                                >
                                <input
                                    type="text"
                                    class="form-control form-control-lg"
                                    id="client-name"
                                    placeholder="Nama atau nama perusahaan"
                                />
                            </div>

                            <div class="mb-3">
                                <label
                                    for="client-email"
                                    class="form-label fw-bold text-primary"
                                    >Email</label
                                >
                                <input
                                    type="email"
                                    class="form-control form-control-lg"
                                    id="client-email"
                                    placeholder="nama@email.com"
                                />
                            </div>

                            <div class="mb-3">
                                <label
                                    for="client-password"
                                    class="form-label fw-bold text-primary"
                                    >Password</label
                                >
                                <input
                                    type="password"
                                    class="form-control form-control-lg"
                                    id="client-password"
                                    placeholder="Minimal 8 karakter"
                                />
                            </div>

                            <div class="mb-3">
                                <label
                                    for="client-phone"
                                    class="form-label fw-bold text-primary"
                                    >Nomor WhatsApp / Telepon</label
                                >
                                <input
                                    type="tel"
                                    class="form-control form-control-lg"
                                    id="client-phone"
                                    placeholder="+62 812 XXXX XXXX"
                                />
                            </div>

                            <div class="form-check mb-3">
                                <input
                                    class="form-check-input"
                                    type="checkbox"
                                    id="client-terms"
                                />
                                <label
                                    class="form-check-label text-secondary-custom"
                                    for="client-terms"
                                >
                                    Saya setuju dengan
                                    <a
                                        href="#"
                                        class="text-primary text-decoration-none"
                                        >Syarat & Ketentuan</a
                                    >
                                </label>
                            </div>
                        </div>

                        <!-- FREELANCER FORM (Hidden by default) -->
                        <div id="freelancer-form" class="d-none">
                            <div class="mb-3">
                                <label
                                    for="freelancer-name"
                                    class="form-label fw-bold text-primary"
                                    >Nama Lengkap</label
                                >
                                <input
                                    type="text"
                                    class="form-control form-control-lg"
                                    id="freelancer-name"
                                    placeholder="Nama lengkap Anda"
                                />
                            </div>

                            <div class="mb-3">
                                <label
                                    for="freelancer-email"
                                    class="form-label fw-bold text-primary"
                                    >Email</label
                                >
                                <input
                                    type="email"
                                    class="form-control form-control-lg"
                                    id="freelancer-email"
                                    placeholder="nama@email.com"
                                />
                            </div>

                            <div class="mb-3">
                                <label
                                    for="freelancer-password"
                                    class="form-label fw-bold text-primary"
                                    >Password</label
                                >
                                <input
                                    type="password"
                                    class="form-control form-control-lg"
                                    id="freelancer-password"
                                    placeholder="Minimal 8 karakter"
                                />
                            </div>

                            <div class="mb-3">
                                <label
                                    for="freelancer-skills"
                                    class="form-label fw-bold text-primary"
                                    >Kategori Keahlian Utama</label
                                >
                                <select
                                    class="form-select form-select-lg"
                                    id="freelancer-skills"
                                >
                                    <option value="">
                                        -- Pilih Kategori --
                                    </option>
                                    <option value="web-dev">
                                        Web Development
                                    </option>
                                    <option value="mobile-dev">
                                        Mobile Development
                                    </option>
                                    <option value="design">
                                        Desain Grafis
                                    </option>
                                    <option value="writing">
                                        Penulisan & Konten
                                    </option>
                                    <option value="video">
                                        Video Editing & Animasi
                                    </option>
                                    <option value="data">Data Analysis</option>
                                    <option value="other">Lainnya</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label
                                    for="freelancer-portfolio"
                                    class="form-label fw-bold text-primary"
                                    >Link Portofolio / LinkedIn</label
                                >
                                <input
                                    type="url"
                                    class="form-control form-control-lg"
                                    id="freelancer-portfolio"
                                    placeholder="https://portfolio.com"
                                />
                                <small class="text-secondary-custom"
                                    >(Opsional)</small
                                >
                            </div>

                            <div class="form-check mb-3">
                                <input
                                    class="form-check-input"
                                    type="checkbox"
                                    id="freelancer-terms"
                                />
                                <label
                                    class="form-check-label text-secondary-custom"
                                    for="freelancer-terms"
                                >
                                    Saya setuju dengan
                                    <a
                                        href="#"
                                        class="text-primary text-decoration-none"
                                        >Syarat & Ketentuan</a
                                    >
                                </label>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <button
                            type="submit"
                            class="btn btn-primary btn-lg w-100 fw-bold text-white mb-3"
                        >
                            Daftar
                        </button>
                    </form>

                    <!-- Login Link -->
                    <div class="text-center">
                        <p class="text-secondary-custom mb-0">
                            Sudah punya akun?
                            <a
                                href="login.html"
                                class="text-primary text-decoration-none fw-bold"
                                >Masuk di sini</a
                            >
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            let selectedRole = "client"; // Default role

            function selectRole(role, button) {
                selectedRole = role;

                // Update active button
                document
                    .querySelectorAll(".role-tab")
                    .forEach((btn) => btn.classList.remove("active"));
                button.classList.add("active");

                // Toggle forms
                const clientForm = document.getElementById("client-form");
                const freelancerForm =
                    document.getElementById("freelancer-form");

                if (role === "client") {
                    clientForm.classList.remove("d-none");
                    freelancerForm.classList.add("d-none");
                } else {
                    clientForm.classList.add("d-none");
                    freelancerForm.classList.remove("d-none");
                }
            }

            // Form submission
            document
                .getElementById("register-form")
                .addEventListener("submit", function (e) {
                    e.preventDefault();

                    let email,
                        name,
                        password,
                        isValid = true;

                    if (selectedRole === "client") {
                        email = document.getElementById("client-email").value;
                        name = document.getElementById("client-name").value;
                        password =
                            document.getElementById("client-password").value;
                        const terms =
                            document.getElementById("client-terms").checked;

                        if (!email || !name || !password || !terms) {
                            alert(
                                "Semua field harus diisi dan syarat & ketentuan harus disetujui.",
                            );
                            isValid = false;
                        }
                    } else {
                        email =
                            document.getElementById("freelancer-email").value;
                        name = document.getElementById("freelancer-name").value;
                        password = document.getElementById(
                            "freelancer-password",
                        ).value;
                        const terms =
                            document.getElementById("freelancer-terms").checked;

                        if (!email || !name || !password || !terms) {
                            alert(
                                "Semua field harus diisi dan syarat & ketentuan harus disetujui.",
                            );
                            isValid = false;
                        }
                    }

                    if (!isValid) return;

                    // In production, this would call an API to register the user
                    // For now, we'll just save to localStorage and redirect

                    localStorage.setItem("userName", name);
                    localStorage.setItem("userEmail", email);
                    localStorage.setItem("userRole", selectedRole);

                    alert(
                        "Pendaftaran berhasil! Anda akan diarahkan ke halaman beranda.",
                    );

                    // Redirect to homepage with role parameter
                    window.location.href = `homepage.html?role=${selectedRole}`;
                });
        </script>
    </body>
</html>
